      - paragraph [ref=e5]: About GasUndo
      - heading "A small map for a difficult moment" [level=1] [ref=e6]
      - generic [ref=e7]:
        - paragraph [ref=e8]: GasUndo exists because the war-driven LPG shortage has affected everyday life across Kochi. As supply became uncertain, many restaurants were pushed into running at lower capacity, serving a smaller menu, or closing altogether for parts of the day.
        - paragraph [ref=e9]: This map is meant to make one frustrating problem a little easier. Instead of calling around or travelling only to find a shutter down, people can quickly check what is open, what is serving a limited menu, and what has had to close.
        - paragraph [ref=e10]: GasUndo depends on community updates because situations can change fast. Every confirmed status helps someone else decide where to go for food without wasting time, fuel, or effort.
      - generic [ref=e11]:
        - paragraph [ref=e12]: A note from us
        - generic [ref=e13]:
          - paragraph [ref=e14]: If you do not see your favourite place on this map, it is most likely because OpenStreetMap, the underlying map that powers a lot of things on the internet, does not yet have the data it needs there.
          - paragraph [ref=e15]: If you can, please help improve OpenStreetMap by mapping your favourite cafe, restaurant, bakery, or even your favourite tree by the roadside. Small acts of mapping make local tools like GasUndo more useful for everyone.
          - paragraph [ref=e16]: If you are new to OpenStreetMap, this short walkthrough shows how to add and edit places properly.
